name: Build Wheels

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-13]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get OCCT cache key
        id: occt-key
        shell: bash
        run: |
          OCCT_COMMIT=$(git rev-parse HEAD:upstream/OCCT)
          echo "hash=${{ runner.os }}-${OCCT_COMMIT}-${{ hashFiles('patches/*.patch', 'scripts/build_occt.py') }}" >> $GITHUB_OUTPUT

      - name: Cache OCCT build
        uses: actions/cache@v4
        with:
          path: |
            upstream/OCCT/lin64
            upstream/OCCT/win64
            upstream/OCCT/mac64
          key: occt-${{ steps.occt-key.outputs.hash }}
          save-always: true

      - uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.0
        with:
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl