name: Build cp311 Wheels (Blender)

# Run manually from the Actions tab on your fork
on:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux x86_64, macOS arm64 (Apple Silicon only — Blender 5.1+), Windows x86_64
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Compute a cache key identical to the main wheels.yml
      - name: Get OCCT cache key
        id: occt-key
        shell: bash
        run: |
          OCCT_COMMIT=$(git rev-parse HEAD:upstream/OCCT)
          echo "hash=${{ runner.os }}-${OCCT_COMMIT}-${{ hashFiles('patches/*.patch', 'scripts/build_occt.py') }}" >> $GITHUB_OUTPUT

      # Reuse any OCCT build cached by wheels.yml (same key)
      - name: Cache OCCT build
        uses: actions/cache@v4
        with:
          path: |
            upstream/OCCT/lin64
            upstream/OCCT/lin32
            upstream/OCCT/win64
            upstream/OCCT/mac64
          key: occt-${{ steps.occt-key.outputs.hash }}
          save-always: true

      # Required on Windows so MSVC tools are on PATH inside cibuildwheel
      - uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Build cp311 wheels
        uses: pypa/cibuildwheel@v3.3.0
        with:
          output-dir: wheelhouse
        env:
          # Only build CPython 3.11 (skip cp312, cp313, pypy, etc.)
          CIBW_BUILD: "cp311-*"
          # Override wheel.py-api from pyproject.toml (cp312 → cp311)
          SKBUILD_WHEEL_PY_API: "cp311"

      - uses: actions/upload-artifact@v4
        with:
          name: cp311-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error
